simple_takeoff_service:
  ros__parameters:
    default_takeoff_altitude_m: 20.0
    arm_check_delay_s: 0.5

waypoint_demo_mission:
  ros__parameters:
    takeoff_altitude_m: 20.0
    waypoint_altitude_m: 20.0
    arrival_radius_m: 3.0
    arrival_height_tolerance_m: 2.0
    hold_time_s: 4.0
    setpoint_rate_hz: 20.0
    rtl_mode: "RTL"

# East/North ENU offsets from home in metres.
# Each entry is [east_m, north_m].  Loaded directly by the node
# (not through ROS params, so nested lists are supported).
waypoints:
  - [20.0, 0.0]
  - [20.0, 20.0]
  - [0.0, 20.0]
  - [0.0, 0.0]