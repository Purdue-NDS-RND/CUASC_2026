simple_takeoff_service:
  ros__parameters:
    default_takeoff_altitude_m: 20.0
    guided_mode_name: "GUIDED"
    mode_retry_s: 2.0
    arm_retry_s: 5.0
    max_arm_attempts: 5
    post_arm_settle_s: 5.0
    takeoff_retry_s: 5.0
    loop_rate_hz: 2.0
    stream_rate_hz: 20
    required_topics:
      - "/mavros/local_position/pose"
      - "/mavros/imu/data"
      - "/mavros/extended_state"

mission_executor:
  ros__parameters:
    loop_rate_hz: 20.0
    abort_rtl_mode: "RTL"

mipi_grabber:
  ros__parameters:
    image_width: 1280
    image_height: 720
    fps: 60
    shutter_speed: 1000
    wb_mode: 6
    image_publishing_rate: 30.0
    camera_info_file: "mipi_info.yaml"
    compressed_quality: 20

target_cv:
  ros__parameters:
    image_topic: "camera/image/compressed"
    debug_view: true
    start_enabled: false
    compressed_input: true
    sim_hsv: false
    min_circularity: 0.4
    hsv_blur_kernel_px: 5
    morph_kernel_px: 7
    mask_blur_kernel_px: 5

session_logger:
  ros__parameters:
    output_base: "~/cuasc_logs"
    session_name: "live"
    image_interval_s: 1.0
    command_topic: "/mavros/setpoint_raw/local"
    camera_topic: "/camera/image/compressed"
    camera_compressed_input: true
    annotated_topic: "/target_cv/annotated"
    mask_topic: "/target_cv/mask"
    debug_topic_warn_after_s: 5.0
