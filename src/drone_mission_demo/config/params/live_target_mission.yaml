simple_takeoff_service:
  ros__parameters:
    default_takeoff_altitude_m: 20.0
    guided_mode_name: "GUIDED"
    mode_retry_s: 2.0
    arm_retry_s: 5.0
    max_arm_attempts: 5
    post_arm_settle_s: 5.0
    takeoff_retry_s: 5.0
    loop_rate_hz: 2.0
    stream_rate_hz: 20
    required_topics:
      - "/mavros/local_position/pose"
      - "/mavros/imu/data"
      - "/mavros/extended_state"

mission_executor:
  ros__parameters:
    loop_rate_hz: 20.0
    abort_rtl_mode: "RTL"

usb_grabber:
  ros__parameters:
    lock_white_balance: true
    manual_white_balance: 4500
    # Negative values leave the camera auto/default for that control.
    # Exact ranges vary by camera; run: v4l2-ctl -d <camera> --list-ctrls
    brightness: 10               # Typical 0-255 or -64-64; higher brightens image, too high washes red pink/white.
    contrast: 2                 # Typical 0-64 or 0-255; higher separates red/white, too high crushes dark detail.
    saturation: 180               # Typical 0-128 or 0-255; higher makes red vivid, low makes red pale/pink/gray.
    hue: -1                      # Typical -40-40 or -180-180; shifts all colors, avoid unless red hue is rotated.
    gamma: -1                    # Typical 72-500; higher lifts midtones, too high makes red look faded.
    gain: 0                     # Typical 0-100 or 0-255; higher brightens sensor signal, high adds noise/pink tint.
    sharpness: -1                # Typical 0-6 or 0-255; higher sharpens edges, high adds halos/red speckles.
    backlight_compensation: 2   # Typical 0-1 or 0-2; helps dark target on bright field, can over-brighten.
    power_line_frequency: -1     # Typical 0=off, 1=50Hz, 2=60Hz; indoor flicker control, usually irrelevant outdoors.
    exposure_dynamic_framerate: -1  # Typical 0-1; 1 may brighten by reducing actual FPS.
    auto_exposure: -1            # Typical 1=manual, 3=auto on UVC; -1 leaves auto/default.
    exposure_time_absolute: -1   # Typical 1-10000; higher is brighter/longer exposure, high blurs and washes red.

target_cv:
  ros__parameters:
    image_topic: "camera/image/compressed"
    debug_view: true
    start_enabled: false
    compressed_input: true
    sim_hsv: false
