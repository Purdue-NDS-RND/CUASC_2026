simple_takeoff_service:
  ros__parameters:
    default_takeoff_altitude_m: 20.0
    guided_mode_name: "GUIDED"
    mode_retry_s: 2.0
    arm_retry_s: 5.0
    max_arm_attempts: 5
    post_arm_settle_s: 5.0
    takeoff_retry_s: 5.0
    loop_rate_hz: 2.0
    stream_rate_hz: 20
    required_topics:
      - "/mavros/local_position/pose"
      - "/mavros/imu/data"
      - "/mavros/extended_state"

mission_executor:
  ros__parameters:
    loop_rate_hz: 20.0
    abort_rtl_mode: "RTL"

usb_grabber:
  ros__parameters:
    camera_type: "global"
    device_path: ""
    image_width: 640
    image_height: 480
    publish_width: 640
    publish_height: 480
    fps: 60.0
    image_publishing_rate: 30.0
    frame_id: "camera_link"
    publish_raw: false
    publish_compressed: true
    compressed_quality: 20
    reset_v4l2_controls: true
    lock_white_balance: true
    manual_white_balance: 4500

target_cv:
  ros__parameters:
    image_topic: "camera/image/compressed"
    debug_view: true
    start_enabled: false
    compressed_input: true
    sim_hsv: false
