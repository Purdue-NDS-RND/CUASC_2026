simple_takeoff_service:
  ros__parameters:
    default_takeoff_altitude_m: 20.0
    guided_mode_name: "GUIDED"
    mode_retry_s: 2.0
    arm_retry_s: 5.0
    max_arm_attempts: 5
    post_arm_settle_s: 5.0
    takeoff_retry_s: 5.0
    loop_rate_hz: 2.0
    stream_rate_hz: 20
    required_topics:
      - "/mavros/local_position/pose"
      - "/mavros/imu/data"
      - "/mavros/extended_state"

mission_executor:
  ros__parameters:
    loop_rate_hz: 20.0
    abort_rtl_mode: "RTL"

usb_grabber:
  ros__parameters:
    lock_white_balance: true
    manual_white_balance: 4500

target_cv:
  ros__parameters:
    image_topic: "camera/image/compressed"
    debug_view: true
    start_enabled: false
    compressed_input: true
    sim_hsv: false
