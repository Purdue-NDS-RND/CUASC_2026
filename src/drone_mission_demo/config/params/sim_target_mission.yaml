simple_takeoff_service:
  ros__parameters:
    default_takeoff_altitude_m: 20.0
    guided_mode_name: "GUIDED"
    mode_retry_s: 2.0
    arm_retry_s: 5.0
    max_arm_attempts: 5
    post_arm_settle_s: 5.0
    takeoff_retry_s: 5.0
    loop_rate_hz: 2.0
    stream_rate_hz: 20
    required_topics:
      - "/mavros/local_position/pose"
      - "/mavros/imu/data"
      - "/mavros/extended_state"

mission_executor:
  ros__parameters:
    loop_rate_hz: 20.0
    abort_rtl_mode: "RTL"

target_cv:
  ros__parameters:
    image_topic: "camera/image"
    debug_view: true
    start_enabled: false
    compressed_input: false
    sim_hsv: true
    min_circularity: 0.4  # 1.0 is circle-like; reject long/irregular red blobs below this.

session_logger:
  ros__parameters:
    output_base: "~/cuasc_logs"
    session_name: "demo"
    image_interval_s: 1.0
    command_topic: "/mavros/setpoint_raw/local"
    camera_topic: "/camera/image"
    camera_compressed_input: false
    annotated_topic: "/target_cv/annotated"
    mask_topic: "/target_cv/mask"
    debug_topic_warn_after_s: 5.0
