mission_sequence:
  on_failure: abort_and_rtl
  missions:
    - type: takeoff
      name: takeoff
      config:
        target_altitude_m: 20.0

    - type: gps_waypoint
      name: waypoint_navigation
      config:
        waypoint_file: ../waypoints/competition_waypoints.yaml
        waypoint_altitude_m: 20.0
        arrival_radius_m: 1.0
        arrival_alt_tolerance_m: 2.0
        hold_time_s: 0.5
        desired_yaw_deg: 90.0
        mode: waypoint_navigation

    - type: package_drop
      name: package_drop
      failure_policy: continue_to_next
      config:
        # Live-flight template: edit these coordinates before real flight.
        # The copied defaults below are inherited from the simulation demo and
        # are not safe operating coordinates on a real field.
        target_latitude: 40.4278733
        target_longitude: -86.9283805
        transit_altitude_m: 15.0
        drop_altitude_m: 6.0
        fake_drop: false
        descent_rate_mps: 0.5
        camera_fx_px: 2334.99647
        camera_fy_px: 2338.06625
        camera_calibration_width_px: 3840.0
        camera_calibration_height_px: 2160.0
        camera_yaw_offset_deg: 0.0
        centering_tolerance_m: 0.50
        centering_deadband_m: 0.40
        tracking_low_pass_alpha: 0.12
        centering_gain_mps_per_m: 0.15
        max_centering_speed_mps: 0.45
        arrival_radius_m: 3.0
        arrival_alt_tolerance_m: 2.0
        not_found_ascent_m: 1.0
        max_recovery_altitude_m: 40.0
        max_recovery_attempts: 4
        target_loss_grace_s: 4.0
        recovery_alt_tolerance_m: 0.5
        min_projection_altitude_m: 0.75
        max_projection_distance_m: 25.0
        centering_dwell_s: 0.5
        drop_altitude_tolerance_m: 3.0
        drop_column_handoff_altitude_m: 8.0
        drop_hover_dwell_s: 8.0
        target_timeout_s: 2.0

    - type: rtl
      name: rtl
      config:
        rtl_mode: "RTL"
