mission_sequence:
  on_failure: abort_and_rtl
  missions:
    - type: takeoff
      name: takeoff
      config:
        target_altitude_m: 15.0

    - type: package_drop
      name: package_drop
      failure_policy: continue_to_next
      config:
        # Offset from the default SITL spawn so fake-drop still exercises transit.
        target_latitude: -35.3631271
        target_longitude: 149.1653479
        transit_altitude_m: 15.0
        drop_altitude_m: 4.0
        fake_drop: true
        descent_rate_mps: 0.35
        camera_fx_px: 2334.99647
        camera_fy_px: 2338.06625
        camera_calibration_width_px: 3840.0
        camera_calibration_height_px: 2160.0
        camera_yaw_offset_deg: 0.0
        centering_tolerance_m: 0.22
        centering_deadband_m: 0.08
        tracking_low_pass_alpha: 0.22
        centering_gain_mps_per_m: 0.35
        max_centering_speed_mps: 0.60
        arrival_radius_m: 3.0
        arrival_alt_tolerance_m: 2.0
        not_found_ascent_m: 3.0
        max_recovery_altitude_m: 40.0
        max_recovery_attempts: 10
        min_projection_altitude_m: 0.75
        max_projection_distance_m: 25.0
        centering_dwell_s: 1.0
        drop_hover_dwell_s: 8.0
        servo_channel: 9
        servo_open_pwm: 1900
        enable_gimbal_pointing: false
        gimbal_pitch_deg: -90.0
        gimbal_yaw_deg: 0.0
        target_timeout_s: 2.0

    - type: rtl
      name: rtl
      config:
        rtl_mode: "RTL"
