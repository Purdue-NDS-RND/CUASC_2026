mission_sequence:
  on_failure: abort_and_rtl
  missions:
    - type: package_drop
      name: package_drop
      config:
        target_latitude: -35.3632621
        target_longitude: 149.1652375
        transit_altitude_m: 15.0
        takeoff_altitude_m: 15.0
        drop_altitude_m: 4.0
        centering_tolerance_px: 15.0
        arrival_radius_m: 3.0
        arrival_alt_tolerance_m: 2.0
        not_found_ascent_m: 3.0
        centering_dwell_s: 1.0
        drop_hover_dwell_s: 8.0
        servo_channel: 9
        servo_open_pwm: 1900
        gimbal_pitch_deg: -90.0
        gimbal_yaw_deg: 0.0
        transit_yaw_deg: 90.0
        hold_yaw_deg: 90.0
        target_timeout_s: 2.0

    - type: rtl
      name: rtl
      config:
        rtl_mode: "RTL"
