mission_sequence:
  on_failure: abort_and_rtl
  missions:
    - type: takeoff
      name: takeoff
      config:
        target_altitude_m: 10.0

    - type: local_waypoint
      name: fly_square
      config:
        pattern_file: ../patterns/square.yaml
        waypoint_altitude_m: 20.0
        arrival_radius_m: 1.0
        arrival_height_tolerance_m: 2.0
        hold_time_s: 2.0
        desired_yaw_deg: 90.0

    - type: local_waypoint
      name: fly_zig_zag
      config:
        pattern_file: ../patterns/zig_zag.yaml
        waypoint_altitude_m: 20.0
        arrival_radius_m: 1.0
        arrival_height_tolerance_m: 2.0
        hold_time_s: 2.0
        desired_yaw_deg: 90.0

    - type: rtl
      name: rtl
      config:
        rtl_mode: "RTL"
