simple_takeoff_service:
  ros__parameters:
    default_takeoff_altitude_m: 5.0
    guided_mode_name: "GUIDED"
    mode_retry_s: 2.0
    arm_retry_s: 5.0
    max_arm_attempts: 5
    takeoff_retry_s: 5.0
    loop_rate_hz: 2.0
    stream_rate_hz: 20
    required_topics:
      - "/mavros/local_position/pose"
      - "/mavros/imu/data"

# Simulation Start Pos
#latitude: -35.3632621
#longitude: 149.1652375


payload_drop:
  ros__parameters:
    target_latitude: -35.3632621        # <-- SET THIS to your drop zone latitude
    target_longitude: 149.1652375       # <-- SET THIS to your drop zone longitude
    transit_altitude_m: 15.0
    drop_altitude_m: 4.0
    centering_tolerance_px: 15.0
    arrival_radius_m: 3.0
    arrival_alt_tolerance_m: 2.0
    servo_channel: 9
    servo_open_pwm: 1900
    servo_close_pwm: 1100
    setpoint_rate_hz: 20.0
    guided_mode_name: "GUIDED"
    not_found_ascent_m: 3.0
    centering_dwell_s: 1.0    # seconds target must stay centred before descending
    drop_hover_dwell_s: 8.0   # seconds to hover at drop altitude before releasing

target_cv:
  ros__parameters:
    image_topic: "camera/image"
    debug_view: True
