target_cv:
    ros__parameters:
        image_topic: "camera/image"
        compressed_input: false
        debug_view: true
        # Standalone live CV launch should subscribe immediately. Mission launches
        # keep their own target_cv start_enabled=false gating in live_target_mission.yaml.
        start_enabled: true

        # Live/outdoor target detector profile.
        sim_hsv: false
        min_target_area_px: 25.0
        min_cluster_area_px: 0.0
        min_detection_confidence: 0.25
        min_circularity: 0.4
        min_solid_score: 0.0
        min_bullseye_score: 0.0

        # Mask cleanup. Live uses stronger cleanup than sim to suppress speckles.
        hsv_blur_kernel_px: 5
        morph_kernel_px: 7
        mask_blur_kernel_px: 5

        use_light_normalization: true
        clahe_clip_limit: 2.0
        clahe_tile_grid_size_px: 8

        hsv_red1_h_min: 0
        hsv_red1_h_max: 8
        hsv_red2_h_min: 168
        hsv_red2_h_max: 180
        hsv_s_min: 80
        hsv_s_max: 255
        hsv_v_min: 45
        hsv_v_max: 255

        red_dominance_ratio: 1.35
        red_difference_min: 40
        red_min_channel: 60
        red_dominance_s_min: 95
        red_dominance_v_min: 55

        cluster_kernel_px: 31
        cluster_dilate_iterations: 1
        radial_ray_count: 32
        radial_sample_count: 80
        bullseye_min_transitions: 3.0
